---
version: '3.8'
services:
  quickstarts-db:
    image: quay.io/sclorg/postgresql-15-c9s:latest
    restart: always
    environment:
    - POSTGRESQL_USER=quickstarts
    - POSTGRESQL_PASSWORD=quickstarts
    - POSTGRESQL_DATABASE=quickstarts
    - POSTGRESQL_ADMIN_PASSWORD=admin
    ports:
    - "5432:5432"
    volumes:
    - quickstarts-db:/var/lib/postgresql/data
    - ./init-test-db.sh:/opt/app-root/src/postgresql-start/init-test-db.sh:Z
    expose:
    - "5432"
volumes:
  quickstarts-db:
    driver: local
